<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZABO | Restaurant + Drink Prototype</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --line: #dde4ee;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f766e;
        --primary-soft: #ccfbf1;
        --accent: #7c3aed;
        --danger: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Noto Sans Thai", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      header {
        background: linear-gradient(125deg, #115e59, #7c3aed);
        color: white;
        padding: 1rem;
        position: sticky;
        top: 0;
        z-index: 9;
      }

      .header-wrap {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .brand {
        font-size: 1.2rem;
        font-weight: 700;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .nav-link {
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        color: white;
        text-decoration: none;
        font-size: 0.85rem;
      }

      .nav-link.active {
        background: white;
        color: var(--primary);
        border-color: white;
      }

      main {
        max-width: 1200px;
        margin: 1rem auto 2rem;
        padding: 0 1rem;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 1rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .grid.food-drink {
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      }

      .grid.menu-admin {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .menu-card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 12px;
      }

      .menu-card h4 {
        margin: 0.75rem 0 0.2rem;
      }

      .badge {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        font-size: 0.78rem;
        background: var(--primary-soft);
        color: var(--primary);
        margin-bottom: 0.4rem;
      }

      .price {
        font-weight: 700;
      }

      .order-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        border-bottom: 1px dashed var(--line);
        padding: 0.5rem 0;
      }

      .qty-pill {
        padding: 0.1rem 0.45rem;
        border-radius: 99px;
        background: #ecfeff;
        color: #0e7490;
        font-size: 0.75rem;
      }

      .customer-switch {
        display: grid;
        grid-template-columns: repeat(2, minmax(100px, 1fr));
        gap: 0.5rem;
      }

      .customer-switch button.active {
        background: var(--accent);
      }

      label {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      input,
      select,
      textarea,
      button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.65rem 0.7rem;
        font: inherit;
      }

      textarea {
        min-height: 92px;
      }

      button {
        cursor: pointer;
        border: none;
        background: var(--primary);
        color: white;
        font-weight: 600;
      }

      .button-ghost {
        background: white;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .button-danger {
        background: var(--danger);
      }

      .button-small {
        width: auto;
        padding: 0.35rem 0.6rem;
        font-size: 0.82rem;
      }

      .input-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.75rem;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.75rem;
      }

      .kpi {
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.8rem;
      }

      .kpi small {
        color: var(--muted);
      }

      .kpi strong {
        display: block;
        margin-top: 0.35rem;
        font-size: 1.2rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 0.6rem 0.2rem;
        font-size: 0.92rem;
      }

      .table-actions {
        display: flex;
        gap: 0.35rem;
      }

      .table-actions button {
        width: auto;
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
      }

      .note {
        border-left: 4px solid var(--accent);
        background: #f5f3ff;
        padding: 0.7rem 0.8rem;
        border-radius: 8px;
        color: #4c1d95;
        font-size: 0.9rem;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-wrap">
        <div>
          <div class="brand">🍽️ ZABO Prototype (Food + Drink)</div>
          <small>Mock Flow เท่านั้น: ยังไม่เชื่อม Firebase และ Python backend</small>
        </div>
        <nav id="nav"></nav>
      </div>
    </header>

    <main>
      <section id="store" class="screen"></section>
      <section id="login" class="screen"></section>
      <section id="profile" class="screen"></section>
      <section id="backoffice" class="screen"></section>
      <section id="menu-admin" class="screen"></section>
      <section id="member-admin" class="screen"></section>
      <section id="promo-admin" class="screen"></section>
    </main>

    <script>
      const store = {
        menus: [
          {
            id: "F001",
            name: "ข้าวกะเพราหมูกรอบ",
            price: 89,
            image: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=1200&q=80",
            category: "food",
            active: true
          },
          {
            id: "F002",
            name: "ผัดไทยกุ้งสด",
            price: 95,
            image: "https://images.unsplash.com/photo-1559847844-5315695dadae?auto=format&fit=crop&w=1200&q=80",
            category: "food",
            active: true
          },
          {
            id: "F003",
            name: "สปาเก็ตตี้คาโบนารา",
            price: 129,
            image: "https://images.unsplash.com/photo-1473093226795-af9932fe5856?auto=format&fit=crop&w=1200&q=80",
            category: "food",
            active: true
          },
          {
            id: "D001",
            name: "ชาไทยเย็น",
            price: 55,
            image: "https://images.unsplash.com/photo-1542444459-db63c1f9f0f6?auto=format&fit=crop&w=1200&q=80",
            category: "drink",
            active: true
          },
          {
            id: "D002",
            name: "เลมอนโซดา",
            price: 65,
            image: "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=1200&q=80",
            category: "drink",
            active: true
          },
          {
            id: "D003",
            name: "อเมริกาโน่เย็น",
            price: 70,
            image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=1200&q=80",
            category: "drink",
            active: false
          }
        ],
        members: [
          {
            id: "M001",
            name: "พลอย สายชิม",
            phone: "0899991111",
            password: "1234",
            points: 230,
            status: "active",
            mustChangePassword: false
          },
          {
            id: "M002",
            name: "นนท์ กินเพลิน",
            phone: "0812223333",
            password: "9999",
            points: 120,
            status: "active",
            mustChangePassword: false
          },
          {
            id: "M003",
            name: "เมย์ ชอบชานม",
            phone: "0825557777",
            password: "5555",
            points: 70,
            status: "inactive",
            mustChangePassword: true
          }
        ],
        promotions: [
          { id: "P001", title: "ลดเครื่องดื่ม 15%", type: "percent", value: 15, active: true },
          { id: "P002", title: "ส่วนลดอาหาร 30 บาท", type: "fixed", value: 30, active: true },
          { id: "P003", title: "โปรสมาชิกพิเศษ", type: "percent", value: 10, active: false }
        ],
        orders: [
          {
            id: "SO-412",
            customerType: "member",
            memberId: "M001",
            items: [{ menuId: "F001", qty: 1 }, { menuId: "D001", qty: 1 }],
            subtotal: 144,
            discount: 0,
            total: 144,
            status: "paid",
            createdAt: "2026-04-05T10:00:00Z"
          },
          {
            id: "SO-425",
            customerType: "member",
            memberId: "M001",
            items: [{ menuId: "F002", qty: 2 }],
            subtotal: 190,
            discount: 0,
            total: 190,
            status: "paid",
            createdAt: "2026-04-07T12:30:00Z"
          },
          {
            id: "SO-420",
            customerType: "member",
            memberId: "M002",
            items: [{ menuId: "F001", qty: 1 }, { menuId: "D002", qty: 1 }],
            subtotal: 154,
            discount: 0,
            total: 154,
            status: "paid",
            createdAt: "2026-04-06T14:00:00Z"
          }
        ]
      };

      const routes = [
        { id: "store", label: "หน้าร้าน" },
        { id: "login", label: "ล็อกอินสมาชิก" },
        { id: "profile", label: "โปรไฟล์สมาชิก" },
        { id: "backoffice", label: "หน้าหลังร้าน" },
        { id: "menu-admin", label: "จัดการเมนู" },
        { id: "member-admin", label: "จัดการสมาชิก" },
        { id: "promo-admin", label: "จัดการโปรโมชั่น" }
      ];

      const state = {
        currentMemberId: "M001",
        customerType: "guest",
        orderItems: [],
        menuTab: "all"
      };

      const getCurrentMember = () => store.members.find((member) => member.id === state.currentMemberId) ?? null;
      const getMenuById = (menuId) => store.menus.find((menu) => menu.id === menuId);

      function getDashboardSummary() {
        const paidOrders = store.orders.filter((order) => order.status === "paid");
        let foodSales = 0;
        let drinkSales = 0;
        paidOrders.forEach((order) => {
          order.items.forEach((item) => {
            const menu = getMenuById(item.menuId);
            if (!menu) {
              return;
            }
            const lineTotal = menu.price * item.qty;
            if (menu.category === "food") {
              foodSales += lineTotal;
            } else {
              drinkSales += lineTotal;
            }
          });
        });
        return {
          totalSales: paidOrders.reduce((sum, order) => sum + order.total, 0),
          foodSales,
          drinkSales,
          membersCount: store.members.length,
          menusCount: store.menus.length,
          promotionsCount: store.promotions.length
        };
      }

      function renderNav(activeRoute) {
        const nav = document.querySelector("#nav");
        nav.innerHTML = routes
          .map(
            (route) =>
              `<a class="nav-link ${activeRoute === route.id ? "active" : ""}" href="#${route.id}">${route.label}</a>`
          )
          .join("");
      }

      function addToOrder(itemId) {
        const menuItem = getMenuById(itemId);
        if (!menuItem) {
          return;
        }

        const found = state.orderItems.find((item) => item.id === itemId);
        if (found) {
          found.qty += 1;
        } else {
          state.orderItems.push({ ...menuItem, qty: 1 });
        }

        renderStorePage();
      }

      function setCustomerType(type) {
        state.customerType = type;
        renderStorePage();
      }

      function setMenuTab(tab) {
        state.menuTab = tab;
        renderStorePage();
      }

      function updateOrderQty(itemId, change) {
        const found = state.orderItems.find((item) => item.id === itemId);
        if (!found) {
          return;
        }
        found.qty += change;
        if (found.qty <= 0) {
          state.orderItems = state.orderItems.filter((item) => item.id !== itemId);
        }
        renderStorePage();
      }

      function removeOrderItem(itemId) {
        state.orderItems = state.orderItems.filter((item) => item.id !== itemId);
        renderStorePage();
      }

      function createOrder() {
        if (state.orderItems.length === 0) {
          alert("กรุณาเพิ่มสินค้าในออเดอร์ก่อน");
          return;
        }
        const subtotal = state.orderItems.reduce((sum, item) => sum + item.price * item.qty, 0);
        const activePromo = store.promotions.find((promo) => promo.active);
        const discount =
          activePromo && activePromo.type === "percent"
            ? Math.round((subtotal * activePromo.value) / 100)
            : activePromo && activePromo.type === "fixed"
              ? activePromo.value
              : 0;
        const total = Math.max(0, subtotal - discount);
        const nextId = `SO-${430 + store.orders.length}`;
        const newOrder = {
          id: nextId,
          customerType: state.customerType,
          memberId: state.customerType === "member" ? state.currentMemberId : null,
          items: state.orderItems.map((item) => ({ menuId: item.id, qty: item.qty })),
          subtotal,
          discount,
          total,
          status: "paid",
          createdAt: new Date().toISOString()
        };
        store.orders.unshift(newOrder);

        if (newOrder.memberId) {
          const member = store.members.find((item) => item.id === newOrder.memberId);
          if (member) {
            member.points += Math.floor(total / 25);
          }
        }

        state.orderItems = [];
        alert(`บันทึกออเดอร์ ${nextId} สำเร็จ (mock)`);
        renderAll();
      }

      function renderOrderSummary() {
        const subtotal = state.orderItems.reduce((sum, item) => sum + item.price * item.qty, 0);
        const activePromo = store.promotions.find((promo) => promo.active);
        const discount =
          activePromo && activePromo.type === "percent"
            ? Math.round((subtotal * activePromo.value) / 100)
            : activePromo && activePromo.type === "fixed"
              ? activePromo.value
              : 0;
        const total = Math.max(0, subtotal - discount);

        if (state.orderItems.length === 0) {
          return `
            <div class="note">ยังไม่มีสินค้าในออเดอร์ ลองเพิ่มเมนู food หรือ drink เพื่อทดสอบ flow.</div>
          `;
        }

        const rows = state.orderItems
          .map(
            (item) => `
              <div class="order-row">
                <div>
                  <div><strong>${item.name}</strong></div>
                  <small class="muted">${item.category} • ฿${item.price}</small>
                </div>
                <div style="text-align:right">
                  <span class="qty-pill">x${item.qty}</span><br />
                  <button type="button" class="button-ghost button-small js-qty" data-id="${item.id}" data-change="-1">-</button>
                  <button type="button" class="button-ghost button-small js-qty" data-id="${item.id}" data-change="1">+</button>
                  <button type="button" class="button-danger button-small js-remove" data-id="${item.id}">ลบ</button>
                  <div>฿${(item.price * item.qty).toLocaleString()}</div>
                </div>
              </div>
            `
          )
          .join("");

        return `
          ${rows}
          <div style="padding-top:0.8rem">
            <div>ยอดรวม: ฿${subtotal.toLocaleString()}</div>
            <div>ส่วนลด (${activePromo ? activePromo.title : "ไม่มี"}): -฿${discount.toLocaleString()}</div>
            <strong>รวมสุทธิ: ฿${total.toLocaleString()}</strong>
            <div style="margin-top:0.8rem"><button type="button" id="checkout-order">ยืนยันออเดอร์ (mock)</button></div>
          </div>
        `;
      }

      function renderStorePage() {
        const menu = store.menus.filter((item) => item.active);
        const filtered =
          state.menuTab === "all" ? menu : menu.filter((item) => item.category === state.menuTab);

        const createMenuCards = (items) =>
          items
            .map(
              (item) => `
                <article class="card menu-card">
                  <img src="${item.image}" alt="${item.name}" />
                  <span class="badge">${item.category.toUpperCase()}</span>
                  <h4>${item.name}</h4>
                  <div class="price">฿${item.price.toLocaleString()}</div>
                  <div style="margin-top:0.7rem"><button class="js-add-order" data-id="${item.id}" type="button">เพิ่มในออเดอร์</button></div>
                </article>
              `
            )
            .join("");

        document.querySelector("#store").innerHTML = `
          <div class="card">
            <h2>หน้าร้าน (Storefront)</h2>
            <p class="muted">เลือกเมนูจาก mock data เดียวกันกับหลังร้าน และสร้างออเดอร์จำลองได้.</p>
            <div class="customer-switch" style="margin-top:0.8rem">
              <button type="button" class="js-customer-type ${state.customerType === "guest" ? "active" : "button-ghost"}" data-type="guest">Guest</button>
              <button type="button" class="js-customer-type ${state.customerType === "member" ? "active" : "button-ghost"}" data-type="member">Member</button>
            </div>
            ${
              state.customerType === "member"
                ? '<div style="margin-top:0.8rem"><button type="button" id="go-login" class="button-ghost">ไปหน้าล็อกอินสมาชิก</button></div>'
                : '<small class="muted">ลูกค้า guest: สามารถสั่งได้เลยโดยไม่ต้องล็อกอิน</small>'
            }
            <div class="customer-switch" style="margin-top:0.8rem">
              <button type="button" class="js-menu-tab ${state.menuTab === "all" ? "active" : "button-ghost"}" data-tab="all">ทั้งหมด</button>
              <button type="button" class="js-menu-tab ${state.menuTab === "food" ? "active" : "button-ghost"}" data-tab="food">Food</button>
              <button type="button" class="js-menu-tab ${state.menuTab === "drink" ? "active" : "button-ghost"}" data-tab="drink">Drink</button>
            </div>
          </div>

          <div class="two-col">
            <div>
              <div class="card">
                <h3>เมนูที่เลือกดู: ${state.menuTab.toUpperCase()}</h3>
                <div class="grid food-drink">${createMenuCards(filtered)}</div>
              </div>
            </div>

            <div class="card">
              <h3>สรุปรายการสั่งซื้อ</h3>
              ${renderOrderSummary()}
            </div>
          </div>
        `;

        document.querySelectorAll(".js-add-order").forEach((button) => {
          button.addEventListener("click", () => addToOrder(button.dataset.id));
        });

        document.querySelectorAll(".js-customer-type").forEach((button) => {
          button.addEventListener("click", () => setCustomerType(button.dataset.type));
        });
        document.querySelectorAll(".js-menu-tab").forEach((button) => {
          button.addEventListener("click", () => setMenuTab(button.dataset.tab));
        });
        document.querySelectorAll(".js-qty").forEach((button) => {
          button.addEventListener("click", () => updateOrderQty(button.dataset.id, Number(button.dataset.change)));
        });
        document.querySelectorAll(".js-remove").forEach((button) => {
          button.addEventListener("click", () => removeOrderItem(button.dataset.id));
        });
        const checkoutButton = document.querySelector("#checkout-order");
        if (checkoutButton) {
          checkoutButton.addEventListener("click", createOrder);
        }

        const goLoginButton = document.querySelector("#go-login");
        if (goLoginButton) {
          goLoginButton.addEventListener("click", () => {
            location.hash = "#login";
          });
        }
      }

      function renderLoginPage() {
        document.querySelector("#login").innerHTML = `
          <div class="two-col">
            <form id="login-form" class="card">
              <h2>ล็อกอินสมาชิก</h2>
              <p class="muted">ใช้เบอร์โทร + รหัสผ่าน (mock login) เพื่อเข้าสู่สมาชิก.</p>
              <div class="input-grid">
                <div>
                  <label for="phone">เบอร์โทรศัพท์</label>
                  <input id="phone" name="phone" placeholder="0812345678" required />
                </div>
                <div>
                  <label for="password">รหัสผ่าน</label>
                  <input id="password" name="password" type="password" placeholder="••••" required />
                </div>
              </div>
              <div style="margin-top: 0.8rem">
                <button type="submit">เข้าสู่ระบบ</button>
              </div>
              <small class="muted">Demo account: 0899991111 / 1234</small>
            </form>

            <div class="card">
              <h3>Flow ที่จะต่อ backend รอบถัดไป</h3>
              <ol>
                <li>validate เบอร์โทร + รหัสผ่านจาก Python API</li>
                <li>ดึงข้อมูลสมาชิกจาก Firebase RTDB</li>
                <li>สร้าง session/token และโหลดหน้าโปรไฟล์สมาชิก</li>
              </ol>
              <p class="note">ตอนนี้ยังเป็น prototype: ไม่มีการบันทึกข้อมูลลงฐานจริง.</p>
            </div>
          </div>
        `;

        document.querySelector("#login-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const formData = new FormData(event.target);
          const phone = formData.get("phone").toString().trim();
          const password = formData.get("password").toString().trim();
          const member = store.members.find((item) => item.phone === phone && item.password === password);

          if (!member) {
            alert("ไม่พบข้อมูลสมาชิก กรุณาตรวจสอบเบอร์โทร/รหัสผ่าน");
            return;
          }

          state.currentMemberId = member.id;
          state.customerType = "member";
          location.hash = "#profile";
        });
      }

      function renderProfilePage() {
        const promotions = store.promotions;
        const member = getCurrentMember();
        const memberOrders = store.orders.filter((order) => order.memberId === member.id);
        const historyRows = memberOrders
          .map(
            (order) => `
              <tr>
                <td>${order.createdAt.slice(0, 10)}</td>
                <td>${order.id}</td>
                <td>฿${order.total.toLocaleString()}</td>
              </tr>
            `
          )
          .join("");

        const promoCards = promotions
          .map(
            (promo) => `
              <article class="card">
                <span class="badge">${promo.type.toUpperCase()}</span>
                <h4>${promo.title}</h4>
                <p>ส่วนลด ${promo.value}${promo.type === "percent" ? "%" : " บาท"}</p>
                <small class="muted">สถานะ: ${promo.active ? "เปิดใช้งาน" : "ปิดใช้งาน"}</small>
              </article>
            `
          )
          .join("");

        document.querySelector("#profile").innerHTML = `
          <div class="card">
            <h2>โปรไฟล์สมาชิก</h2>
            <p><strong>${member.name}</strong> (${member.phone}) • สถานะ: ${member.status}</p>
            <div class="kpis">
              <div class="kpi"><small>แต้มสะสม</small><strong>${member.points} pts</strong></div>
              <div class="kpi"><small>จำนวนบิลทั้งหมด</small><strong>${memberOrders.length} บิล</strong></div>
              <div class="kpi"><small>ต้องเปลี่ยนรหัสผ่าน</small><strong>${member.mustChangePassword ? "Yes" : "No"}</strong></div>
            </div>
          </div>

          <div class="two-col">
            <div class="card">
              <h3>ประวัติการซื้อ</h3>
              <table>
                <thead>
                  <tr><th>วันที่</th><th>เลขออเดอร์</th><th>ยอดซื้อ</th></tr>
                </thead>
                <tbody>${historyRows}</tbody>
              </table>
            </div>

            <div class="card">
              <h3>โปรโมชั่นสำหรับสมาชิก</h3>
              <div class="grid">${promoCards}</div>
            </div>
          </div>
        `;
      }

      function renderBackofficePage() {
        const summary = getDashboardSummary();

        document.querySelector("#backoffice").innerHTML = `
          <div class="card">
            <h2>หน้าหลังร้าน (Back Office)</h2>
            <p class="muted">ศูนย์รวมจัดการเมนู สมาชิก โปรโมชั่น และภาพรวมยอดขาย.</p>
            <div class="kpis">
              <div class="kpi"><small>ยอดขายรวม</small><strong>฿${summary.totalSales.toLocaleString()}</strong></div>
              <div class="kpi"><small>ยอดขาย food</small><strong>฿${summary.foodSales.toLocaleString()}</strong></div>
              <div class="kpi"><small>ยอดขาย drink</small><strong>฿${summary.drinkSales.toLocaleString()}</strong></div>
              <div class="kpi"><small>จำนวนสมาชิก</small><strong>${summary.membersCount}</strong></div>
              <div class="kpi"><small>จำนวนเมนู</small><strong>${summary.menusCount}</strong></div>
              <div class="kpi"><small>จำนวนโปรโมชั่น</small><strong>${summary.promotionsCount}</strong></div>
            </div>
          </div>
        `;
      }

      function renderMenuAdminPage() {
        const menu = store.menus;
        const foodCards = menu
          .filter((item) => item.category === "food")
          .map(
            (item) => `
              <article class="card menu-card">
                <img src="${item.image}" alt="${item.name}" />
                <span class="badge">${item.id} • ${item.active ? "active" : "inactive"}</span>
                <h4>${item.name}</h4>
                <div class="price">฿${item.price.toLocaleString()}</div>
                <div class="table-actions" style="margin-top:0.7rem">
                  <button class="button-ghost button-small" type="button">แก้ไข</button>
                  <button class="button-danger button-small" type="button">ลบ</button>
                </div>
              </article>
            `
          )
          .join("");

        const drinkCards = menu
          .filter((item) => item.category === "drink")
          .map(
            (item) => `
              <article class="card menu-card">
                <img src="${item.image}" alt="${item.name}" />
                <span class="badge">${item.id} • ${item.active ? "active" : "inactive"}</span>
                <h4>${item.name}</h4>
                <div class="price">฿${item.price.toLocaleString()}</div>
                <div class="table-actions" style="margin-top:0.7rem">
                  <button class="button-ghost button-small" type="button">แก้ไข</button>
                  <button class="button-danger button-small" type="button">ลบ</button>
                </div>
              </article>
            `
          )
          .join("");

        document.querySelector("#menu-admin").innerHTML = `
          <div class="card">
            <h2>หน้าจัดการเมนู</h2>
            <p class="muted">แยกรายการเมนูตามหมวด food และ drink เพื่อทดสอบ flow หลังร้าน.</p>
          </div>

          <div class="card">
            <h3>🍛 Food</h3>
            <div class="grid menu-admin">${foodCards}</div>
          </div>

          <div class="card">
            <h3>🥤 Drink</h3>
            <div class="grid menu-admin">${drinkCards}</div>
          </div>
        `;
      }

      function resetMemberPassword(memberId) {
        const member = store.members.find((item) => item.id === memberId);
        if (!member) {
          return;
        }
        member.mustChangePassword = true;
        alert(`ตั้งค่าให้ ${member.name} ต้องเปลี่ยนรหัสผ่านแล้ว`);
        renderAll();
      }

      function renderMemberAdminPage() {
        const members = store.members;
        const rows = members
          .map(
            (member) => `
              <tr>
                <td>${member.id}</td>
                <td>${member.name}</td>
                <td>${member.phone}</td>
                <td>${member.points}</td>
                <td>${member.status}</td>
                <td>${member.mustChangePassword ? "Yes" : "No"}</td>
                <td><button type="button" data-id="${member.id}" class="button-danger button-small js-reset-pass">Reset Password</button></td>
              </tr>
            `
          )
          .join("");

        document.querySelector("#member-admin").innerHTML = `
          <div class="card">
            <h2>หน้าจัดการสมาชิก</h2>
            <p class="muted">รายการสมาชิกตัวอย่าง พร้อมปุ่ม reset password (mock).</p>
          </div>

          <div class="card">
            <h3>รายการสมาชิก</h3>
            <table>
              <thead><tr><th>ID</th><th>ชื่อ</th><th>เบอร์โทร</th><th>แต้ม</th><th>สถานะ</th><th>mustChangePassword</th><th>จัดการ</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;

        document.querySelectorAll(".js-reset-pass").forEach((button) => {
          button.addEventListener("click", () => resetMemberPassword(button.dataset.id));
        });
      }

      function renderPromoAdminPage() {
        const promotions = store.promotions;
        const promoRows = promotions
          .map(
            (promo) => `
              <tr>
                <td>${promo.id}</td>
                <td>${promo.title}</td>
                <td>${promo.type}</td>
                <td>${promo.value}</td>
                <td>${promo.active ? "active" : "inactive"}</td>
              </tr>
            `
          )
          .join("");

        document.querySelector("#promo-admin").innerHTML = `
          <div class="card">
            <h2>หน้าจัดการโปรโมชั่น</h2>
            <p class="muted">รายการโปรโมชั่นทั้งหมดแบบ mock data (ยังไม่ผูกฐานข้อมูล).</p>
          </div>

          <div class="card">
            <h3>โปรโมชั่นปัจจุบัน</h3>
            <table>
              <thead><tr><th>ID</th><th>ชื่อโปร</th><th>ประเภท</th><th>มูลค่า</th><th>สถานะ</th></tr></thead>
              <tbody>${promoRows}</tbody>
            </table>
          </div>
        `;
      }

      function renderAll() {
        renderStorePage();
        renderLoginPage();
        renderProfilePage();
        renderBackofficePage();
        renderMenuAdminPage();
        renderMemberAdminPage();
        renderPromoAdminPage();
      }

      function renderRoute(routeId) {
        const safeRoute = routes.some((route) => route.id === routeId) ? routeId : "store";

        renderNav(safeRoute);
        document.querySelectorAll(".screen").forEach((screen) => screen.classList.remove("active"));
        document.querySelector(`#${safeRoute}`).classList.add("active");
        renderAll();
      }

      window.addEventListener("hashchange", () => renderRoute(location.hash.replace("#", "")));
      renderRoute(location.hash.replace("#", ""));
    </script>
  </body>
</html>
